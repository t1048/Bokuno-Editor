<?xml version="1.0" standalone="no"?>
<svg xmlns:xlink="http://www.w3.org/1999/xlink" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
            <!-- 背景のグラデーション定義 -->
            <defs>
                <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#282a36"/>
                    <stop offset="100%" stop-color="#191a21"/>
                </linearGradient>
                <linearGradient id="glass-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#8be9fd" stop-opacity="0.3"/>
                    <stop offset="100%" stop-color="#8be9fd" stop-opacity="0.05"/>
                </linearGradient>
                <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="8" result="blur"/>
                    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
                </filter>
            </defs>

            <!-- アプリケーショントレイ/背景 (角丸の四角形) -->
            <rect width="512" height="512" rx="112" fill="url(#bg-gradient)"/>
            <rect width="512" height="512" rx="112" fill="none" stroke="#44475a" stroke-width="4"/>

            <!-- シンタックスハイライトされたコード行 -->
            <g transform="translate(0, -20)">
                <!-- 行1: ピンクとシアン -->
                <rect x="110" y="160" width="160" height="28" rx="14" fill="#ff79c6"/>
                <rect x="290" y="160" width="112" height="28" rx="14" fill="#8be9fd"/>
                
                <!-- 行2: グリーンとイエロー (少しインデント) -->
                <rect x="150" y="220" width="90" height="28" rx="14" fill="#50fa7b"/>
                <rect x="260" y="220" width="142" height="28" rx="14" fill="#f1fa8c"/>
                
                <!-- 行3: パープル (さらにインデント) -->
                <rect x="190" y="280" width="212" height="28" rx="14" fill="#bd93f9"/>
                
                <!-- 行4: オレンジ -->
                <rect x="150" y="340" width="120" height="28" rx="14" fill="#ffb86c"/>
            </g>

            <!-- 高速Grep検索を示すルーペ (虫眼鏡) -->
            <g transform="translate(30, 30)">
                <!-- ルーペのガラス部分 (ハイライトされた行の上にかかる) -->
                <circle cx="340" cy="300" r="70" fill="url(#glass-gradient)" stroke="#8be9fd" stroke-width="20" filter="url(#glow)"/>
                <!-- ルーペの反射光 -->
                <path d="M 295 265 Q 320 240 355 250" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
                <!-- ルーペの持ち手 -->
                <line x1="390" y1="350" x2="450" y2="410" stroke="#8be9fd" stroke-width="28" stroke-linecap="round" filter="url(#glow)"/>
                <line x1="390" y1="350" x2="450" y2="410" stroke="#ffffff" stroke-width="12" stroke-linecap="round" opacity="0.8"/>
            </g>
            
            <!-- アクティブなカーソル (点滅をイメージした白い縦線) -->
            <rect x="285" y="320" width="8" height="32" rx="4" fill="#ffffff" filter="url(#glow)"/>

        </svg>